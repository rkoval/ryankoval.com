server {
    listen 80;
    listen [::]:80;
    server_name  localhost ryankoval.com ryankoval.local;
    include /etc/nginx/conf.d/server-common.conf;

    location ^~ /assets/ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
        index  index.html;
        add_header Cache-Control "public";
        expires 1d;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name  blog.ryankoval.com blog.ryankoval.local;
    return 301 https://ryankoval.com/blog$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name  resume.ryankoval.com resume.ryankoval.local;
    return 301 https://ryankoval.com/resume$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name  avatar.ryankoval.com avatar.ryankoval.local;
    include /etc/nginx/conf.d/server-common.conf;

    location / {
        index images/avatar.jpg;
        add_header Content-Type 'image/jpeg' always;
        add_header Cache-Control "public";
        expires 1d;
    }
}
